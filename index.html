// ─── AFFINITY ENGINE ──────────────────────────────────────────────────────
// Calcola affinità come SCARTO dalla media globale dei voti pubblici.
// Bayesian dampening (c=3): generi con pochi film vengono attenuati verso 0.
// Risultato scalato /2 → aggiustamento max ≈ ±0.4 sul punteggio normalizzato.
function computeAffinities(films){
  const gM={},cM={},dM={};
  const votes=films.filter(f=>f.voto_pubblico).map(f=>f.voto_pubblico);
  const globalAvg=votes.length?votes.reduce((a,b)=>a+b,0)/votes.length:3.5;
  films.forEach(f=>{
    const v=f.voto_pubblico;if(!v)return;
    const dev=v-globalAvg;
    (f.genere||"").split(",").forEach(g=>{g=g.trim();if(!g)return;if(!gM[g])gM[g]={s:0,n:0};gM[g].s+=dev;gM[g].n++;});
    (f.paese||"").split(",").forEach(p=>{p=p.trim();if(!p)return;if(!cM[p])cM[p]={s:0,n:0};cM[p].s+=dev;cM[p].n++;});
    if(f.durata){const m=parseInt(f.durata);if(!isNaN(m)){const b=m<90?'<90':m<=110?'90-110':m<=130?'111-130':m<=150?'131-150':'>150';if(!dM[b])dM[b]={s:0,n:0};dM[b].s+=dev;dM[b].n++;}}
  });
  // s/(n+3)/2: Bayesian dampening con c=3, poi scaling /2
  const toAff=(map)=>{const r={};Object.entries(map).forEach(([k,{s,n}])=>{r[k]=(s/(n+3))/2;});return r;};
  return{genre:toAff(gM),country:toAff(cM),duration:toAff(dM),globalAvg};
}
// calcScore riceve `aff` come parametro (calcolato dinamicamente nel componente)
function calcScore(film, aff){
  if(!aff)return null;
  let w=0,tw=0;
  const add=(s,wt)=>{w+=s*wt;tw+=wt;};
  const baseNorm=(aff.globalAvg-1)/4;
  const aff2s=(a)=>Math.max(0,Math.min(1,baseNorm+a));
  const hasVote=film.voto_pubblico!=null;

  // ── Voto pubblico (dominante quando presente) ──────────────────────────
  if(hasVote)add((film.voto_pubblico-1)/4,0.55);

  // ── Critica: peso maggiore senza voto pubblico ─────────────────────────
  if(film.media!=null)add(film.media/5,hasVote?0.20:0.35);
  else{const c=[film.mym,film.cs].filter(x=>x!=null);if(c.length)add(c.reduce((a,b)=>a+b)/c.length/5,hasVote?0.15:0.25);}

  // ── Affinità genere (predittore principale per film non ancora visti) ──
  if(film.genere){
    const affs=(film.genere||"").split(",").map(g=>aff.genre[g.trim()]).filter(x=>x!=null);
    if(affs.length)add(aff2s(affs.reduce((a,b)=>a+b)/affs.length),hasVote?0.15:0.40);
  }

  // ── Affinità paese ─────────────────────────────────────────────────────
  if(film.paese){
    const affs=(film.paese||"").split(",").map(p=>aff.country[p.trim()]).filter(x=>x!=null);
    if(affs.length)add(aff2s(affs.reduce((a,b)=>a+b)/affs.length),hasVote?0.07:0.15);
  }

  // ── Affinità durata ────────────────────────────────────────────────────
  if(film.durata){const m=parseInt(film.durata);if(!isNaN(m)){const b=m<90?'<90':m<=110?'90-110':m<=130?'111-130':m<=150?'131-150':'>150';const ds=aff.duration[b];if(ds!=null)add(aff2s(ds),hasVote?0.03:0.10);}}

  if(tw<0.05)return null;
  return Math.max(1,Math.min(10,Math.round((w/tw)*9+1)));
}

async function fetchFilmInfo(query, existing) {
  const ex=existing||{};
  let film={titolo:query,data:ex.data||"",genere:ex.genere||"",paese:ex.paese||"",durata:ex.durata||"",distribuzione:ex.distribuzione||"",trama:ex.trama||""};

  // ── iTunes IT ──────────────────────────────────────────────────────────
  try{
    const r=await fetch("https://itunes.apple.com/search?term="+encodeURIComponent(query)+"&country=it&media=movie&entity=movie&limit=5");
    const d=await r.json();
    if(d.results&&d.results.length){
      const b=d.results[0];
      const min=b.trackTimeMillis?Math.round(b.trackTimeMillis/60000):null;
      const gEN=b.primaryGenreName||"";
      // NOTA: b.country è il paese dello STORE iTunes (es. "ITA" se cerchi country=it),
      // NON il paese di produzione del film — quindi non viene usato per film.paese
      if(!film.genere&&gEN&&gEN!=="Feature Film") film.genere=GENRE_IT[gEN]||gEN;
      if(!film.durata&&min) film.durata=min+" min";
      if(!film.trama) film.trama=b.longDescription||b.shortDescription||"";
      if(!film.data&&b.releaseDate) film.data=(b.releaseDate||"").slice(0,10);
    }
  }catch(e){}

  // ── iTunes globale (fallback durata/trama) ────────────────────────────
  if(!film.trama||!film.durata){
    try{
      const r=await fetch("https://itunes.apple.com/search?term="+encodeURIComponent(query)+"&media=movie&entity=movie&limit=5");
      const d=await r.json();
      if(d.results&&d.results.length){
        const b=d.results[0];
        const min=b.trackTimeMillis?Math.round(b.trackTimeMillis/60000):null;
        const gEN=b.primaryGenreName||"";
        // Stesso criterio: salta "Feature Film" e il country dello store
        if(!film.genere&&gEN&&gEN!=="Feature Film") film.genere=GENRE_IT[gEN]||gEN;
        if(!film.durata&&min) film.durata=min+" min";
        if(!film.trama) film.trama=b.longDescription||b.shortDescription||"";
        if(!film.data&&b.releaseDate) film.data=(b.releaseDate||"").slice(0,10);
      }
    }catch(e){}
  }

  // ── Wikipedia italiana (trama + dati mancanti) ─────────────────────────
  try{
    const sR=await fetch("https://it.wikipedia.org/w/api.php?action=query&list=search&srsearch="+encodeURIComponent(query+" film")+"&format=json&origin=*&srlimit=5");
    const sD=await sR.json();
    const results=(sD.query&&sD.query.search)||[];
    const best=results.find(function(r){return r.title.toLowerCase().indexOf("film")!==-1||r.snippet.toLowerCase().indexOf("regia")!==-1||r.snippet.toLowerCase().indexOf("diretto")!==-1;})||results[0];
    if(best){
      const pR=await fetch("https://it.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=true&explaintext=true&titles="+encodeURIComponent(best.title)+"&format=json&origin=*");
      const pD=await pR.json();
      const page=Object.values((pD.query&&pD.query.pages)||{})[0];
      if(page&&page.extract&&page.extract.length>50){
        const testo=page.extract.replace(/\n/g," ").trim();
        const frasi=testo.split(". ").filter(function(s){return s.length>15;});
        const trama=frasi.slice(0,4).join(". ")+(frasi.length>0?".":"");
        if(trama.length>30&&(!film.trama||trama.length>film.trama.length)) film.trama=trama;
        if(!film.durata){var mD=testo.match(/della durata di (\d+) minut/);if(mD)film.durata=mD[1]+" min";}
        if(!film.genere){var mG=testo.match(/di genere ([a-zA-Z\xC0-\xFF ,]+?)(?:,| diretto| con )/i);if(mG){var g=mG[1].trim();if(g.length<50)film.genere=g.charAt(0).toUpperCase()+g.slice(1);}}
        if(!film.paese){var mP=testo.match(/film ([a-zA-Z\xC0-\xFF]+) del \d{4}/i);if(mP){var p=mP[1];var pm={"italiano":"Italia","americano":"USA","francese":"Francia","tedesco":"Germania","spagnolo":"Spagna","giapponese":"Giappone","inglese":"Gran Bretagna","irlandese":"Irlanda","belga":"Belgio","danese":"Danimarca"};if(pm[p.toLowerCase()])film.paese=pm[p.toLowerCase()];}}
      }
    }
  }catch(e){}

  const trovato=!!(film.titolo&&(film.trama||film.genere||film.paese));
  return {film:film, trovato:trovato};
}

function App(){
  const [overrides,setOverrides]=useState(()=>LS.get("cinema_ov")||{});
  const [custom,setCustom]=useState(()=>LS.get("cinema_custom")||[]);
  const [search,setSearch]=useState("");
  const [stFilter,setStFilter]=useState("tutti");
  const [catFilter,setCatFilter]=useState("tutti");
  const [dateFilter,setDateFilter]=useState("tutti");
  const [sortBy,setSortBy]=useState("data");
  const [sortDir,setSortDir]=useState("desc");
  const [expanded,setExpanded]=useState(null);
  const [voteInput,setVoteInput]=useState("");
  const [addModal,setAddModal]=useState(false);
  const [editFilm,setEditFilm]=useState(null);
  const [toast,setToast]=useState(null);
  const [updating,setUpdating]=useState(false);
  const [updateProgress,setUpdateProgress]=useState(null);
  const [perPage,setPerPage]=useState(20);
  const [page,setPage]=useState(0);
  // posterMap: prima legge dal localStorage (cache persistente), poi integra da scores.json
  const [posterMap,setPosterMap]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("cinePosterMap")||"{}");}catch(e){return {};}
  });
  const fetchedRef=useRef(new Set());

  // Carica poster da scores.json se presenti (workflow TMDB)
  useEffect(()=>{
    fetch("./scores.json").then(r=>r.json()).then(d=>{
      const m={};
      (d.film||[]).forEach(f=>{if(f.poster_path)m[f.titolo]=TMDB_IMG+f.poster_path;});
      if(Object.keys(m).length){
        setPosterMap(p=>{
          const next={...p,...m};
          try{localStorage.setItem("cinePosterMap",JSON.stringify(next));}catch(e){}
          return next;
        });
      }
    }).catch(()=>{});
  },[]);

  // Fetch locandine mancanti da iTunes (gratuito, nessuna API key)
  useEffect(()=>{
    const missing=allFilms.filter(f=>!fetchedRef.current.has(f.titolo)&&!posterMap[f.titolo]);
    if(!missing.length)return;
    missing.forEach(f=>fetchedRef.current.add(f.titolo));
    let cancelled=false;
    (async()=>{
      for(const f of missing){
        if(cancelled)break;
        try{
          const q=encodeURIComponent(f.titolo);
          const r=await fetch(`https://itunes.apple.com/search?term=${q}&media=movie&limit=5&country=it`);
          const d=await r.json();
          const hit=(d.results||[]).find(x=>x.artworkUrl100);
          if(hit){
            const url=hit.artworkUrl100.replace("100x100bb","600x900bb");
            setPosterMap(p=>{
              const next={...p,[f.titolo]:url};
              try{localStorage.setItem("cinePosterMap",JSON.stringify(next));}catch(e){}
              return next;
            });
          }
        }catch(e){}
        await new Promise(r=>setTimeout(r,120));
      }
    })();
    return()=>{cancelled=true;};
  },[allFilms.length]);

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};
  const isFileProtocol=window.location.protocol==="file:";
  const saveOv=(next)=>{setOverrides(next);LS.set("cinema_ov",next);};
  const saveCust=(next)=>{setCustom(next);LS.set("cinema_custom",next);};

  const allFilms=useMemo(()=>{
    const base=FILMS_BASE.map(f=>({...f,...(overrides[f.titolo]||{})}));
    const cust=custom.map(f=>({...f,...(overrides[f.titolo]||{}),_custom:true}));
    return [...base,...cust];
  },[overrides,custom]);

  // AFF dinamico: si ricalcola ogni volta che cambiano i film o i voti
  const aff=useMemo(()=>computeAffinities(allFilms),[allFilms]);

  const getStatus=useCallback((f)=>{
    const ov=overrides[f.titolo]?.status;
    if(ov==="scartato")return"scartato";
    if(ov==="proiettato")return"proiettato";
    if(f.voto_pubblico!=null)return"proiettato";
    if(f.fatto==="x")return"proiettato";
    return"normale";
  },[overrides]);

  const setStatus=(titolo,st)=>{const p=overrides[titolo]||{};saveOv({...overrides,[titolo]:{...p,status:st}});showToast(st==="proiettato"?"✓ Proiettato":st==="scartato"?"✗ Scartato":"↩ Ripristinato");};
  const saveVote=(titolo,vote)=>{const p=overrides[titolo]||{};saveOv({...overrides,[titolo]:{...p,voto_pubblico:vote}});showToast("⭐ Voto salvato");setExpanded(null);setVoteInput("");};
  const saveEdit=(film,updates)=>{if(film._custom){saveCust(custom.map(f=>f.titolo===film.titolo?{...f,...updates}:f));}else{const p=overrides[film.titolo]||{};saveOv({...overrides,[film.titolo]:{...p,...updates}});}setEditFilm(null);showToast("💾 Info aggiornate");};
  const addFilm=(film)=>{saveCust([...custom,film]);setAddModal(false);showToast("🎬 Film aggiunto");};

  const overridesRef=React.useRef(overrides);
  overridesRef.current=overrides;
  const customRef=React.useRef(custom);
  customRef.current=custom;

  const updateAllFilms=async()=>{
    const daAggiornare=allFilms.filter(f=>!f.trama||!f.genere||!f.paese);
    if(!daAggiornare.length){showToast("Tutti i film hanno gia le info complete");return;}
    setUpdating(true);
    let newOv=Object.assign({},overridesRef.current);
    let newCust=customRef.current.slice();
    let aggiornati=0;
    for(let i=0;i<daAggiornare.length;i++){
      const f=daAggiornare[i];
      setUpdateProgress((i+1)+"/"+daAggiornare.length+" — "+f.titolo.slice(0,28)+"...");
      try{
        const result=await fetchFilmInfo(f.titolo,f);
        const film=result.film;
        const upd={};
        if(!f.trama&&film.trama)upd.trama=film.trama;
        if(!f.genere&&film.genere)upd.genere=film.genere;
        if(!f.paese&&film.paese)upd.paese=film.paese;
        if(!f.durata&&film.durata)upd.durata=film.durata;
        if(!f.data&&film.data)upd.data=film.data;
        if(Object.keys(upd).length>0){
          if(f._custom){
            newCust=newCust.map(function(x){return x.titolo===f.titolo?Object.assign({},x,upd):x;});
          }else{
            const p=newOv[f.titolo]||{};
            newOv[f.titolo]=Object.assign({},p,upd);
          }
          aggiornati++;
        }
      }catch(e){console.log("Errore:",f.titolo,e.message);}
      await new Promise(function(r){return setTimeout(r,600);});
    }
    saveOv(newOv);
    saveCust(newCust);
    setUpdating(false);
    setUpdateProgress(null);
    showToast("Aggiornati "+aggiornati+" film su "+daAggiornare.length);
  };
  const existingTitles=useMemo(()=>new Set(allFilms.map(f=>f.titolo.toLowerCase().trim())),[allFilms]);
  const toggleSort=(col)=>{setPage(0);if(sortBy===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(col);setSortDir("desc");}};

  useEffect(()=>setPage(0),[search,stFilter,catFilter,dateFilter,sortBy,sortDir]);

  const filtered=useMemo(()=>{
    const now=new Date();
    let list=allFilms.filter(f=>{
      if(search&&!f.titolo.toLowerCase().includes(search.toLowerCase())&&!(f.genere||"").toLowerCase().includes(search.toLowerCase()))return false;
      const st=getStatus(f);
      if(stFilter==="proiettati"&&st!=="proiettato")return false;
      if(stFilter==="scartati"&&st!=="scartato")return false;
      if(stFilter==="da_vedere"&&(st==="proiettato"||st==="scartato"))return false;
      if(catFilter==="cineforum"&&!f.cineforum)return false;
      if(catFilter==="cinefamiglia"&&f.cinefamiglia!=="x")return false;
      if(dateFilter!=="tutti"&&f.data){const d=new Date(f.data);if(dateFilter==="p30"&&(d<now||d>new Date(+now+30*864e5)))return false;if(dateFilter==="p90"&&(d<now||d>new Date(+now+90*864e5)))return false;if(dateFilter==="past"&&d>=now)return false;}
      return true;
    });
    list.sort((a,b)=>{const m=sortDir==="asc"?1:-1;if(sortBy==="data")return m*((a.data||"0000").localeCompare(b.data||"0000"));if(sortBy==="media")return m*((a.media||0)-(b.media||0));if(sortBy==="mym")return m*((a.mym||0)-(b.mym||0));if(sortBy==="cs")return m*((a.cs||0)-(b.cs||0));if(sortBy==="voto")return m*((a.voto_pubblico||0)-(b.voto_pubblico||0));if(sortBy==="score")return m*((calcScore(a,aff)||0)-(calcScore(b,aff)||0));return 0;});
    return list;
  },[allFilms,search,stFilter,catFilter,dateFilter,sortBy,sortDir,overrides]);

  const stats=useMemo(()=>{
    const pr=allFilms.filter(f=>getStatus(f)==="proiettato");
    const vs=pr.filter(f=>f.voto_pubblico);
    const avg=vs.length?vs.reduce((s,f)=>s+f.voto_pubblico,0)/vs.length:0;
    return{total:allFilms.length,proiettati:pr.length,scartati:allFilms.filter(f=>getStatus(f)==="scartato").length,conVoto:vs.length,avg};
  },[allFilms,overrides]);

  const exportCSV=()=>{
    const rows=filtered.map(f=>[`"${f.titolo}"`,f.data,`"${f.genere||""}"`,`"${f.paese||""}"`,f.durata||"",`"${f.distribuzione||""}"`,f.mym??"",f.cs??"",f.media??"",f.voto_pubblico??"",calcScore(f,aff)??"",getStatus(f),f.cineforum?"CF":"",f.cinefamiglia==="x"?"FAM":""].join(","));
    const csv=[["Titolo","Data","Genere","Paese","Durata","Distribuzione","MYm","CS","Media","VotoPub","Score","Stato","CF","FAM"].join(","),...rows].join("\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"})),download:"cinema.csv"});a.click();URL.revokeObjectURL(a.href);
    showToast("📥 Export completato");
  };

  const SBtn=({col,label})=>(
    <button onClick={()=>toggleSort(col)} style={{background:sortBy===col?"rgba(232,184,75,0.15)":"transparent",border:`1px solid ${sortBy===col?"rgba(232,184,75,0.4)":"transparent"}`,color:sortBy===col?"#e8b84b":"#666",borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11}}>
      {label}{sortBy===col?(sortDir==="desc"?"↓":"↑"):""}
    </button>
  );

  return(
    <div style={{background:"#0d0d0f",minHeight:"100vh"}}>
      {isFileProtocol&&(
        <div style={{background:"rgba(251,191,36,0.08)",borderBottom:"1px solid rgba(251,191,36,0.3)",padding:"8px 22px",display:"flex",alignItems:"center",gap:10,fontSize:12,color:"#fbbf24"}}>
          <span>⚠️</span>
          <span>Stai aprendo il file direttamente (file://). Le ricerche su iTunes/Wikipedia potrebbero non funzionare su Chrome. Per testare tutto: <code style={{background:"rgba(0,0,0,0.4)",borderRadius:4,padding:"1px 6px",fontFamily:"monospace"}}>python3 -m http.server 8000</code> nella cartella, poi apri <b>http://localhost:8000</b></span>
        </div>
      )}
      {updateProgress&&(
      <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:"#16161e",border:"1px solid rgba(99,102,241,0.4)",color:"#818cf8",padding:"10px 20px",borderRadius:10,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",whiteSpace:"nowrap"}}>
        ⏳ {updateProgress}
      </div>
    )}
    {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.type==="err"?"#450a0a":"#052e16",border:`1px solid ${toast.type==="err"?"#dc2626":"#16a34a"}`,color:"#e0e0e0",padding:"10px 18px",borderRadius:10,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",animation:"fadeIn .2s"}}>{toast.msg}</div>}
      {addModal&&<AddModal onClose={()=>setAddModal(false)} onAdd={addFilm} existingTitles={existingTitles}/>}
      {editFilm&&<EditModal film={editFilm} onClose={()=>setEditFilm(null)} onSave={u=>saveEdit(editFilm,u)}/>}

      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#1a1008,#0d0d0f)",borderBottom:"1px solid rgba(232,184,75,0.2)",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>🎬</span>
          <div>
            <h1 style={{margin:0,fontSize:18,fontWeight:700,color:"#e8b84b",fontFamily:"Georgia,serif",letterSpacing:1}}>Cinema Dashboard</h1>
            <p style={{margin:0,fontSize:9,color:"#444",letterSpacing:1}} className="desktop-only">DIRETTORE ARTISTICO · DATABASE FILM</p>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setAddModal(true)} style={{background:"rgba(232,184,75,0.15)",border:"1px solid rgba(232,184,75,0.45)",color:"#e8b84b",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ Film</button>
          <button onClick={updateAllFilms} disabled={updating} title="Aggiorna automaticamente trama e info per tutti i film che le mancano" className="desktop-only"
            style={{background:updating?"rgba(99,102,241,0.1)":"rgba(99,102,241,0.15)",border:"1px solid rgba(99,102,241,0.4)",color:updating?"#666":"#818cf8",borderRadius:8,padding:"8px 12px",cursor:updating?"wait":"pointer",fontSize:13,whiteSpace:"nowrap"}}>
            {updating?"⏳…":"🔄 Aggiorna"}
          </button>
          <button onClick={exportCSV} className="desktop-only" style={{background:"rgba(255,255,255,0.04)",border:"1px solid #2a2a35",color:"#777",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:13}}>📥 CSV</button>
        </div>
      </div>

      {/* STATS */}
      <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"1px",background:"rgba(232,184,75,0.06)",borderBottom:"1px solid rgba(232,184,75,0.08)"}}>
        {[{l:"TOTALE FILM",v:stats.total,ic:"🎞"},{l:"PROIETTATI",v:stats.proiettati,ic:"✅",c:"#4ade80"},{l:"SCARTATI",v:stats.scartati,ic:"❌",c:"#f87171"},{l:"CON VOTO PUBBLICO",v:stats.conVoto,ic:"⭐"},{l:"MEDIA VOTO PUBBLICO",v:stats.avg>0?stats.avg.toFixed(2):"—",ic:"📊",c:SC(stats.avg)}].map((s,i)=>(
          <div key={i} style={{background:"#111115",padding:"12px 14px",textAlign:"center"}}>
            <div style={{fontSize:18,marginBottom:2}}>{s.ic}</div>
            <div style={{fontSize:20,fontWeight:700,color:s.c||"#e0e0e0"}}>{s.v}</div>
            <div style={{fontSize:"9px",color:"#444",letterSpacing:"0.7px"}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* FILTERS */}
      <div className="filters-bar" style={{padding:"10px 22px",background:"#111115",borderBottom:"1px solid #1e1e24",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cerca titolo o genere…"
          style={{background:"#1a1a20",border:"1px solid #2a2a35",color:"#e0e0e0",borderRadius:7,padding:"7px 12px",fontSize:13,flex:1,minWidth:170}}/>
        {[{k:"tutti",l:"Tutti"},{k:"da_vedere",l:"Da vedere"},{k:"proiettati",l:"Proiettati"},{k:"scartati",l:"Scartati"}].map(({k,l})=>(
          <button key={k} onClick={()=>setStFilter(k)} style={{background:stFilter===k?"rgba(232,184,75,0.16)":"transparent",border:`1px solid ${stFilter===k?"rgba(232,184,75,0.4)":"#2a2a35"}`,color:stFilter===k?"#e8b84b":"#666",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:12}}>{l}</button>
        ))}
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{background:"#1a1a20",border:"1px solid #2a2a35",color:"#e0e0e0",borderRadius:7,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>
          <option value="tutti">Tutte le categorie</option>
          <option value="cineforum">Cineforum</option>
          <option value="cinefamiglia">Cinefamiglia</option>
        </select>
        <select value={dateFilter} onChange={e=>setDateFilter(e.target.value)} style={{background:"#1a1a20",border:"1px solid #2a2a35",color:"#e0e0e0",borderRadius:7,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>
          <option value="tutti">Tutte le date</option>
          <option value="p30">Prossimi 30gg</option>
          <option value="p90">Prossimi 90gg</option>
          <option value="past">Film passati</option>
        </select>
        <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
          <span style={{fontSize:"10px",color:"#333",alignSelf:"center",marginRight:2}}>ORDINA:</span>
          <SBtn col="data" label="Data"/><SBtn col="score" label="Score"/><SBtn col="media" label="Media"/>
          <SBtn col="mym" label="MYm"/><SBtn col="cs" label="CS"/><SBtn col="voto" label="Voto"/>
        </div>
      </div>

      {/* COL HEADERS */}
      <div className="desktop-only" style={{display:"grid",gridTemplateColumns:"4px 48px 1fr 46px 46px 46px 46px 46px 44px 110px",alignItems:"center",background:"#0a0a0d",borderBottom:"1px solid #1a1a22",padding:"5px 0"}}>
        <div/><div/>
        <div style={{padding:"0 14px",fontSize:"9px",color:"#333"}}>FILM ({filtered.length})</div>
        {["MYm","CS","MEDIA","PUBBL","SCORE","✏","STATO"].map(h=><div key={h} style={{textAlign:"center",fontSize:"9px",color:"#333"}}>{h}</div>)}
      </div>

      {/* LIST */}
      {/* Pagination controls */}
      <div className="pagination-bar" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 22px",background:"#0d0d0f",borderBottom:"1px solid #1a1a20"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:"11px",color:"#444"}}>Per pagina:</span>
          {[20,30,50,100].map(n=>(
            <button key={n} onClick={()=>{setPerPage(n);setPage(0);}}
              style={{background:perPage===n?"rgba(232,184,75,0.15)":"transparent",border:`1px solid ${perPage===n?"rgba(232,184,75,0.4)":"#2a2a35"}`,color:perPage===n?"#e8b84b":"#555",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:11}}>{n}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:"11px",color:"#444"}}>
            {page*perPage+1}-{Math.min((page+1)*perPage,filtered.length)} di {filtered.length}
          </span>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
            style={{background:"rgba(255,255,255,0.04)",border:"1px solid #2a2a35",color:page===0?"#333":"#888",borderRadius:5,padding:"3px 10px",cursor:page===0?"default":"pointer",fontSize:12}}>‹</button>
          <button onClick={()=>setPage(p=>Math.min(Math.ceil(filtered.length/perPage)-1,p+1))} disabled={(page+1)*perPage>=filtered.length}
            style={{background:"rgba(255,255,255,0.04)",border:"1px solid #2a2a35",color:(page+1)*perPage>=filtered.length?"#333":"#888",borderRadius:5,padding:"3px 10px",cursor:(page+1)*perPage>=filtered.length?"default":"pointer",fontSize:12}}>›</button>
        </div>
      </div>
      {/* Desktop list */}
      <div className="desktop-only">
      {filtered.slice(page*perPage,(page+1)*perPage).map((f,idx)=>{
        const status=getStatus(f);
        const score=calcScore(f,aff);
        const isExp=expanded===f.titolo;
        const stripe=status==="proiettato"?"#4ade80":status==="scartato"?"#f87171":"transparent";
        const hasInfo=!!(f.genere||f.paese);
        const posterUrl=posterMap[f.titolo]||null;
        return(
          <div key={f.titolo+idx} style={{borderBottom:"1px solid #161620"}}>
            <div onClick={()=>setExpanded(isExp?null:f.titolo)}
              style={{display:"grid",gridTemplateColumns:"4px 48px 1fr 46px 46px 46px 46px 46px 44px 110px",alignItems:"center",background:isExp?"#191924":idx%2?"#0f0f13":"#111115",cursor:"pointer",minHeight:50}}>
              <div style={{height:"100%",minHeight:50,background:stripe,opacity:.55}}/>
              {/* Mini poster */}
              <div style={{width:48,height:50,overflow:"hidden",flexShrink:0}}>
                {posterUrl
                  ? <img src={posterUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} loading="lazy" onError={e=>{e.target.style.display="none";}}/>
                  : <div style={{width:"100%",height:"100%",background:"#1a1a24",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:16,opacity:0.15}}>🎬</span></div>}
              </div>
              <div style={{padding:"8px 14px"}}>
                <div style={{fontSize:13,fontWeight:600,color:status==="scartato"?"#3a3a42":"#e0e0e0",textDecoration:status==="scartato"?"line-through":"none",marginBottom:2}}>{f.titolo}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                  {f.data&&<span style={{fontSize:"10px",color:"#444"}}>{f.data.slice(0,7)}</span>}
                  {f.genere&&<span style={{fontSize:"10px",color:"#3a3a42"}}>{f.genere.split(",")[0].trim()}</span>}
                  {f._custom&&<span style={{fontSize:"9px",background:"rgba(232,184,75,0.1)",color:"#e8b84b",borderRadius:3,padding:"1px 4px"}}>custom</span>}
                  {!hasInfo&&<span style={{fontSize:"9px",background:"rgba(251,191,36,0.1)",color:"#fbbf24",borderRadius:3,padding:"1px 4px"}}>⚠ info mancanti</span>}
                  {f.cineforum&&<span style={{fontSize:"9px",background:"rgba(129,140,248,0.1)",color:"#818cf8",borderRadius:3,padding:"1px 4px"}}>CF</span>}
                  {f.cinefamiglia==="x"&&<span style={{fontSize:"9px",background:"rgba(251,191,36,0.1)",color:"#fbbf24",borderRadius:3,padding:"1px 4px"}}>FAM</span>}
                </div>
              </div>
              <div style={{textAlign:"center"}}><SBadge value={f.mym} small/></div>
              <div style={{textAlign:"center"}}><SBadge value={f.cs} small/></div>
              <div style={{textAlign:"center"}}><SBadge value={f.media} small/></div>
              <div style={{textAlign:"center"}}><SBadge value={f.voto_pubblico} small/></div>
              <div style={{textAlign:"center"}}><RBadge score={score}/></div>
              <div style={{textAlign:"center"}} onClick={e=>{e.stopPropagation();setEditFilm(f);}}>
                <button style={{background:"rgba(255,255,255,0.03)",border:"1px solid #2a2a35",color:"#555",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✏️</button>
              </div>
              <div style={{padding:"0 8px",display:"flex",alignItems:"center",gap:4}} onClick={e=>e.stopPropagation()}>
                {status==="proiettato"&&<span style={{fontSize:"10px",color:"#4ade80",fontWeight:600}}>✓ Fatto</span>}
                {status==="scartato"&&<span style={{fontSize:"10px",color:"#f87171",fontWeight:600}}>✗ Scartato</span>}
                {status==="normale"&&<div style={{display:"flex",gap:3}}>
                  <button onClick={()=>setStatus(f.titolo,"proiettato")} style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.25)",color:"#4ade80",borderRadius:4,padding:"3px 7px",cursor:"pointer",fontSize:10}}>✓</button>
                  <button onClick={()=>setStatus(f.titolo,"scartato")} style={{background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",color:"#f87171",borderRadius:4,padding:"3px 7px",cursor:"pointer",fontSize:10}}>✗</button>
                </div>}
                {(status==="proiettato"||status==="scartato")&&<button onClick={()=>setStatus(f.titolo,"normale")} style={{background:"rgba(100,100,100,0.06)",border:"1px solid #252530",color:"#444",borderRadius:4,padding:"3px 5px",cursor:"pointer",fontSize:9}}>↩</button>}
              </div>
            </div>

            {isExp&&(
              <div style={{background:"#13131b",padding:"16px 22px",borderTop:"1px solid #1e1e28",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20}}>
                {/* Dettagli */}
                <div>
                  <h3 style={{margin:"0 0 10px",fontSize:11,color:"#e8b84b",textTransform:"uppercase",letterSpacing:1}}>Dettagli</h3>
                  {[["Genere",f.genere],["Paese",f.paese],["Durata",f.durata],["Distribuzione",f.distribuzione],["Data uscita",f.data]].filter(([,v])=>v).map(([k,v])=>(
                    <div key={k} style={{display:"flex",gap:8,marginBottom:5}}>
                      <span style={{fontSize:"10px",color:"#3a3a4a",minWidth:80}}>{k}</span>
                      <span style={{fontSize:"11px",color:"#888"}}>{v}</span>
                    </div>
                  ))}
                  {!hasInfo&&<div style={{marginTop:8,padding:"8px 10px",background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:6}}>
                    <p style={{margin:0,fontSize:11,color:"#fbbf24"}}>⚠ Info mancanti — clicca ✏️ per aggiungerle.</p>
                  </div>}
                  {f.trama&&<div style={{marginTop:10}}>
                    <h4 style={{margin:"0 0 5px",fontSize:10,color:"#e8b84b",textTransform:"uppercase",letterSpacing:1}}>Trama</h4>
                    <p style={{margin:0,fontSize:11,color:"#777",lineHeight:1.6}}>{f.trama}</p>
                  </div>}
                </div>
                {/* Punteggi */}
                <div>
                  <h3 style={{margin:"0 0 10px",fontSize:11,color:"#e8b84b",textTransform:"uppercase",letterSpacing:1}}>Punteggi</h3>
                  <div style={{display:"flex",gap:10,marginBottom:14}}>
                    {[["MYm",f.mym],["CS",f.cs],["Media",f.media],["Pubblico",f.voto_pubblico]].map(([l,v])=>(
                      <div key={l} style={{textAlign:"center"}}><SBadge value={v}/><div style={{fontSize:"9px",color:"#3a3a4a",marginTop:2}}>{l}</div></div>
                    ))}
                  </div>
                  <h3 style={{margin:"0 0 8px",fontSize:11,color:"#e8b84b",textTransform:"uppercase",letterSpacing:1}}>Score Consigliato (1-10)</h3>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                    <RBadge score={score}/>
                    <span style={{fontSize:12,color:"#666"}}>{score==null?"Dati insufficienti":score>=8?"Fortemente consigliato":score>=6?"Consigliato":score>=4?"Da valutare":"Poco indicato"}</span>
                  </div>
                  <div style={{fontSize:"10px",color:"#444",background:"rgba(255,255,255,0.02)",borderRadius:6,padding:"8px 10px",border:"1px solid #1e1e28"}}>
                    {[["Voto pubblico (40%)",f.voto_pubblico?`${f.voto_pubblico}/5`:"—"],["Critica online (30%)",f.media?`${f.media}/5`:"—"],["Affinità genere (15%)",(f.genere||"").split(",")[0]||"—"],["Affinità paese (10%)",(f.paese||"").split(",")[0]||"—"],["Affinità durata (5%)",f.durata||"—"]].map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #1a1a22"}}>
                        <span style={{color:"#444"}}>{k}</span><span style={{color:"#666"}}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Voto pubblico */}
                <div>
                  <h3 style={{margin:"0 0 10px",fontSize:11,color:"#e8b84b",textTransform:"uppercase",letterSpacing:1}}>Voto Pubblico (Tablet)</h3>
                  <div style={{display:"flex",gap:3,marginBottom:12}}>
                    {[1,2,3,4,5].map(s=>(
                      <span key={s} onClick={()=>saveVote(f.titolo,s)}
                        style={{fontSize:24,cursor:"pointer",color:f.voto_pubblico&&s<=Math.round(f.voto_pubblico)?"#e8b84b":"#1e1e28",userSelect:"none"}}>★</span>
                    ))}
                    {f.voto_pubblico&&<span style={{fontSize:12,color:"#666",alignSelf:"center",marginLeft:4}}>({f.voto_pubblico})</span>}
                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:14}}>
                    <input type="number" min="1" max="5" step="0.1" value={voteInput} onChange={e=>setVoteInput(e.target.value)} placeholder="es. 3.8"
                      style={{background:"#1a1a24",border:"1px solid #2a2a35",color:"#e0e0e0",borderRadius:6,padding:"6px 10px",width:110,fontSize:12}}/>
                    <button onClick={()=>{const v=parseFloat(voteInput);if(!isNaN(v)&&v>=1&&v<=5)saveVote(f.titolo,v);else showToast("Voto tra 1 e 5","err");}}
                      style={{background:"rgba(232,184,75,0.13)",border:"1px solid rgba(232,184,75,0.35)",color:"#e8b84b",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>Salva</button>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>setStatus(f.titolo,status==="proiettato"?"normale":"proiettato")} style={{background:status==="proiettato"?"rgba(74,222,128,0.15)":"rgba(74,222,128,0.05)",border:`1px solid rgba(74,222,128,${status==="proiettato"?0.45:0.18})`,color:"#4ade80",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:11}}>{status==="proiettato"?"↩ Togli proiettato":"✓ Segna proiettato"}</button>
                    <button onClick={()=>setStatus(f.titolo,status==="scartato"?"normale":"scartato")} style={{background:status==="scartato"?"rgba(248,113,113,0.15)":"rgba(248,113,113,0.05)",border:`1px solid rgba(248,113,113,${status==="scartato"?0.45:0.18})`,color:"#f87171",borderRadius:7,padding:"6px 11px",cursor:"pointer",fontSize:11}}>{status==="scartato"?"↩ Ripristina":"✗ Scarta"}</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:60,color:"#282830"}}><div style={{fontSize:36,marginBottom:10}}>🎞</div><div>Nessun film trovato</div></div>}
      </div>{/* end desktop-only */}

      {/* MOBILE CARD GRID */}
      <div className="mobile-cards" style={{gridTemplateColumns:"repeat(2,1fr)",gap:10,padding:10,display:"none"}}>
        {filtered.length===0
          ? <div style={{gridColumn:"1/-1",textAlign:"center",padding:60,color:"#282830"}}><div style={{fontSize:36,marginBottom:10}}>🎞</div><div>Nessun film trovato</div></div>
          : filtered.slice(page*perPage,(page+1)*perPage).map((f,idx)=>{
              const status=getStatus(f);
              const score=calcScore(f,aff);
              const isExp=expanded===f.titolo;
              const posterUrl=posterMap[f.titolo]||null;
              return(
                <MobileCard key={f.titolo+idx}
                  f={f} score={score} status={status} posterUrl={posterUrl}
                  isExp={isExp}
                  onToggle={()=>setExpanded(isExp?null:f.titolo)}
                  onVote={v=>saveVote(f.titolo,v)}
                  voteInput={voteInput} setVoteInput={setVoteInput}
                  setStatus={setStatus}
                />
              );
            })
        }
      </div>

      {/* Pagination controls — BOTTOM */}
      {filtered.length>0&&<div className="pagination-bar" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 22px",background:"#0d0d0f",borderTop:"1px solid #1a1a20"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:"11px",color:"#444"}}>Per pagina:</span>
          {[20,30,50,100].map(n=>(
            <button key={n} onClick={()=>{setPerPage(n);setPage(0);}}
              style={{background:perPage===n?"rgba(232,184,75,0.15)":"transparent",border:`1px solid ${perPage===n?"rgba(232,184,75,0.4)":"#2a2a35"}`,color:perPage===n?"#e8b84b":"#555",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:11}}>{n}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:"11px",color:"#444"}}>
            {page*perPage+1}-{Math.min((page+1)*perPage,filtered.length)} di {filtered.length}
          </span>
          <button onClick={()=>{setPage(p=>Math.max(0,p-1));window.scrollTo({top:0,behavior:"smooth"});}} disabled={page===0}
            style={{background:"rgba(255,255,255,0.04)",border:"1px solid #2a2a35",color:page===0?"#333":"#888",borderRadius:5,padding:"3px 10px",cursor:page===0?"default":"pointer",fontSize:12}}>‹</button>
          <button onClick={()=>{setPage(p=>Math.min(Math.ceil(filtered.length/perPage)-1,p+1));window.scrollTo({top:0,behavior:"smooth"});}} disabled={(page+1)*perPage>=filtered.length}
            style={{background:"rgba(255,255,255,0.04)",border:"1px solid #2a2a35",color:(page+1)*perPage>=filtered.length?"#333":"#888",borderRadius:5,padding:"3px 10px",cursor:(page+1)*perPage>=filtered.length?"default":"pointer",fontSize:12}}>›</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
